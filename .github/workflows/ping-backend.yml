name: Ping backend

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ping-backend.yml'
  schedule:
    # GitHub Actions cron uses UTC. Run every 10 minutes, then skip
    # requests during 12:00 AM-5:59 AM India Standard Time in the job.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Send backend keep-alive request
    runs-on: ubuntu-latest
    steps:
      - name: Skip during India night hours
        id: india_time
        run: |
          current_hour=$(TZ=Asia/Kolkata date +%H)
          echo "current_hour=$current_hour" >> "$GITHUB_OUTPUT"

          if [ "$current_hour" -ge 0 ] && [ "$current_hour" -lt 6 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ping because it is between 12:00 AM and 6:00 AM IST."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send GET request
        if: steps.india_time.outputs.skip != 'true'
        run: |
          curl --silent --show-error --location \
            --connect-timeout 20 \
            --max-time 180 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --output /dev/null \
            --write-out 'HTTP %{http_code} in %{time_total}s\n' \
            https://vidyaschool-backend.onrender.com
